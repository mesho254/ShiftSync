version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: shiftsync-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shiftsync
    networks:
      - shiftsync-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shiftsync-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/shiftsync
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - mongodb
    networks:
      - shiftsync-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shiftsync-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - shiftsync-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  shiftsync-network:
    driver: bridge

volumes:
  mongodb_data:
